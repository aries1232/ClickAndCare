service: clickandcare-api
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:AWS_REGION, 'ap-south-1'}
  stage: ${opt:stage, 'production'}
  memorySize: 512
  timeout: 29  # API Gateway hard cap is 30s
  logRetentionInDays: 14
  environment:
    NODE_ENV: production
    MONGODB_URI: ${env:MONGODB_URI}
    JWT_SECRET: ${env:JWT_SECRET}
    CLOUDINARY_NAME: ${env:CLOUDINARY_NAME}
    CLOUDINARY_API_KEY: ${env:CLOUDINARY_API_KEY}
    CLOUDINARY_SECRET_KEY: ${env:CLOUDINARY_SECRET_KEY}
    STRIPE_SECRET: ${env:STRIPE_SECRET}
    STRIPE_WEBHOOK_SECRET: ${env:STRIPE_WEBHOOK_SECRET}
    EMAIL_HOST: ${env:EMAIL_HOST, ''}
    EMAIL_PORT: ${env:EMAIL_PORT, ''}
    EMAIL_SECURE: ${env:EMAIL_SECURE, ''}
    EMAIL_USER: ${env:EMAIL_USER}
    EMAIL_PASSWORD: ${env:EMAIL_PASSWORD}
    EMAIL_FROM: ${env:EMAIL_FROM, ''}
    FRONTEND_URL: ${env:FRONTEND_URL}
    ADMIN_URL: ${env:ADMIN_URL}
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID, ''}
  httpApi:
    cors:
      allowedOrigins:
        - ${env:FRONTEND_URL}
        - ${env:ADMIN_URL}
      allowedHeaders:
        - Content-Type
        - Authorization
        - token
        - atoken
        - dToken
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true

functions:
  api:
    handler: lambda.main
    events:
      - httpApi: '*'

package:
  individually: false
  excludeDevDependencies: true
  patterns:
    # Default-deny most things, then allow code + production node_modules.
    - '!**'
    - 'lambda.js'
    - 'app.js'
    - 'package.json'
    - 'config/**'
    - 'controllers/**'
    - 'middlewares/**'
    - 'models/**'
    - 'routes/**'
    - 'socket/**'
    - 'utils/**'
    - 'node_modules/**'
    # Now strip junk that crept into node_modules.
    - '!node_modules/.cache/**'
    - '!node_modules/**/test/**'
    - '!node_modules/**/tests/**'
    - '!node_modules/**/__tests__/**'
    - '!node_modules/**/example/**'
    - '!node_modules/**/examples/**'
    - '!node_modules/**/docs/**'
    - '!node_modules/**/*.md'
    - '!node_modules/**/*.ts'
    - '!node_modules/**/*.map'
