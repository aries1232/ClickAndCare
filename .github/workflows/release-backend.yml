name: Build & Release — backend (AWS Lambda)

# Manual-only. Start a run from the Actions tab when you want a new
# backend build to hit Lambda.
on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Serverless stage to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      confirm:
        description: 'Type "release" to confirm'
        required: true
        default: ''

concurrency:
  group: release-backend-${{ inputs.stage }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Safety rail: user has to type "release" in the input to proceed.
    if: ${{ inputs.confirm == 'release' }}
    defaults:
      run:
        working-directory: backend
    env:
      # AWS
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}

      # Runtime env vars (forwarded into Lambda via serverless.yml)
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_SECRET_KEY: ${{ secrets.CLOUDINARY_SECRET_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      ADMIN_URL: ${{ secrets.ADMIN_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install production deps
        run: npm ci --omit=dev

      - name: Install Serverless Framework
        run: npm i -g serverless@3

      - name: Build & Release (stage=${{ inputs.stage }})
        run: serverless deploy --stage ${{ inputs.stage }} --verbose
