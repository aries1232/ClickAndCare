name: Deploy frontends (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'admin/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: frontend
            dir: frontend
            project_id_secret: VERCEL_PROJECT_ID_FRONTEND
          - name: admin
            dir: admin
            project_id_secret: VERCEL_PROJECT_ID_ADMIN
    defaults:
      run:
        working-directory: ${{ matrix.app.dir }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[matrix.app.project_id_secret] }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app.dir }}/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment (${{ matrix.app.name }})
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build (${{ matrix.app.name }})
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy (${{ matrix.app.name }})
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
