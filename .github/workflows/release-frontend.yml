name: Build & Release — frontend (Vercel)

# Manual-only. Start a run from the Actions tab when you want a new
# frontend build to hit Vercel.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Vercel environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

concurrency:
  group: release-frontend-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment (${{ inputs.environment }})
        run: vercel pull --yes --environment=${{ inputs.environment }} --token=$VERCEL_TOKEN

      - name: Build
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            vercel build --prod --token=$VERCEL_TOKEN
          else
            vercel build --token=$VERCEL_TOKEN
          fi

      - name: Release
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          else
            vercel deploy --prebuilt --token=$VERCEL_TOKEN
          fi
